function isSolanaAddress(addr) {
  return !addr.startsWith("0x") && /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(addr);
}

// Recursively extract first array found in a nested API response
function extractArray(obj) {
  if (Array.isArray(obj)) return obj;
  if (obj && typeof obj === "object") {
    // Check common keys first
    for (var k of ["data", "results", "items", "records", "labels"]) {
      if (obj[k]) {
        if (Array.isArray(obj[k])) return obj[k];
        if (typeof obj[k] === "object") {
          var nested = extractArray(obj[k]);
          if (nested.length > 0) return nested;
        }
      }
    }
    // Check all other keys
    var keys = Object.keys(obj);
    for (var i = 0; i < keys.length; i++) {
      if (Array.isArray(obj[keys[i]]) && obj[keys[i]].length > 0) return obj[keys[i]];
    }
  }
  return [];
}

async function nansenPost(path, body) {
  var res = await fetch("/api/nansen", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-nansen-path": path },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error("Nansen API " + res.status);
  return res.json();
}

async function fetchLabels(addr) {
  try {
    return await nansenPost("/api/beta/profiler/address/labels", {
      parameters: { chain: "all", address: addr },
      pagination: { page: 1, recordsPerPage: 100 },
    });
  } catch (e) { console.warn("labels failed:", e); return []; }
}

async function fetchBalances(addr) {
  var chains = getChainsForAddress(addr);
  var results = await Promise.allSettled(chains.map(function(chain) {
    return nansenPost("/api/v1/profiler/address/current-balance", {
      chain: chain,
      address: addr,
      hide_spam_token: true,
      pagination: { page: 1, per_page: 100 },
    }).then(function(r) {
      var items = r && r.data ? r.data : (Array.isArray(r) ? r : []);
      return items.map(function(b) { b._chain = chain; return b; });
    });
  }));
  var allData = [];
  var activeChains = [];
  results.forEach(function(r, i) {
    if (r.status === "fulfilled" && r.value.length > 0) {
      allData = allData.concat(r.value);
      activeChains.push(chains[i]);
    }
  });
  return { data: allData, _activeChains: activeChains };
}

async function fetchTransactions(addr) {
  var chains = getChainsForAddress(addr);
  var now = new Date();
  var from = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
  var results = await Promise.allSettled(chains.map(function(chain) {
    return nansenPost("/api/v1/profiler/address/transactions", {
      address: addr,
      chain: chain,
      date: { from: from.toISOString(), to: now.toISOString() },
      hide_spam_token: true,
      pagination: { page: 1, per_page: 50 },
      order_by: [{ field: "block_timestamp", direction: "DESC" }],
    }).then(function(r) {
      var items = r && r.data ? r.data : (Array.isArray(r) ? r : []);
      return items.map(function(t) { t._chain = chain; return t; });
    });
  }));
  var allData = [];
  results.forEach(function(r) {
    if (r.status === "fulfilled") allData = allData.concat(r.value);
  });
  return { data: allData };
}

async function fetchPnl(addr) {
  var chains = getChainsForAddress(addr);
  var results = await Promise.allSettled(chains.map(function(chain) {
    return nansenPost("/api/v1/profiler/address/pnl-summary", {
      chain: chain,
      address: addr,
    });
  }));
  var best = null;
  results.forEach(function(r) {
    if (r.status === "fulfilled" && r.value) {
      if (!best) best = r.value;
    }
  });
  return best;
}

}

function classifyWallet(labels, balances, txData, pnlData, hasSmartLabel) {
  var labelNames = Array.isArray(labels) ? labels.map(function(l) { return ((l.label || "") + " " + (l.fullname || "") + " " + (l.name || "") + " " + (l.type || "") + " " + (typeof l === "string" ? l : "")).toLowerCase(); }) : [];

  var txArr = txData && txData.data ? txData.data : (Array.isArray(txData) ? txData : []);
  var totalUsd = 0; var defiTokens = 0; var memeTokens = 0; var stableTokens = 0;
  var DEFI_SYMBOLS = ["aave","uni","crv","comp","mkr","snx","ldo","pendle","gmx","sushi","yfi","bal","jup","ray","mnde","orca","msol","drift","pyth","jto"];

  var SOL_SMART_SYMBOLS = ["jup","ray","mnde","orca","msol","drift","pyth","jto","marinade","raydium"];
  var solDefiCount = 0;
  balArr.forEach(function(b) {
    var val = parseFloat(b.value_usd || b.usdValue || 0);
    totalUsd += val;
    var sym = (b.token_symbol || b.symbol || "").toLowerCase();
    if (DEFI_SYMBOLS.indexOf(sym) >= 0) defiTokens++;
    if (MEME_SYMBOLS.indexOf(sym) >= 0) memeTokens++;
    if (STABLE_SYMBOLS.indexOf(sym) >= 0) stableTokens++;
    if (SOL_SMART_SYMBOLS.indexOf(sym) >= 0) solDefiCount++;
  });
  var txCount = txArr.length;
  var isFund = hasSmartLabel || labelNames.some(function(l) { return l.includes("fund") || l.includes("smart trader") || l.includes("smart money") || l.includes("smart"); });
  var isWhale = totalUsd > 10000000 || labelNames.some(function(l) { return l.includes("whale"); });
  var isExchange = labelNames.some(function(l) { return l.includes("exchange") || l.includes("cex"); });
  var isDeployer = labelNames.some(function(l) { return l.includes("deployer") || l.includes("contract creator"); });
  var isPerp = labelNames.some(function(l) { return l.includes("perp") || l.includes("leverag") || l.includes("hyperliquid") || l.includes("token millionaire"); });

  // Detect smart money from PnL data
  var hasStrongPnl = false;
  if (pnlData) {
    // Handle nested formats: pnlData could be { data: {...} }, { data: [{...}] }, or flat
    var pnl = pnlData;
    if (pnl.data && Array.isArray(pnl.data) && pnl.data.length > 0) pnl = pnl.data[0];
    else if (pnl.data && typeof pnl.data === "object" && !Array.isArray(pnl.data)) pnl = pnl.data;
    // Try all known Nansen PnL field names
    var realized = parseFloat(pnl.realized_pnl || pnl.realizedPnl || pnl.total_realized_pnl || pnl.realized || 0);
    var winRate = parseFloat(pnl.win_rate || pnl.winRate || pnl.win_ratio || 0);
    var totalPnl = parseFloat(pnl.total_pnl || pnl.pnl || pnl.totalPnl || pnl.total || 0);
    var roi = parseFloat(pnl.roi || pnl.ROI || 0);
    console.log("PnL parsed:", { realized: realized, winRate: winRate, totalPnl: totalPnl, roi: roi, raw: pnl });
    if (realized > 10000 || winRate > 0.4 || totalPnl > 10000 || roi > 1000) hasStrongPnl = true;
  }

  // Detect Solana smart money: active Solana wallet with decent portfolio or DeFi activity
  var isSolana = balArr.some(function(b) { return b._chain === "solana"; });
  var isSolSmartMoney = isSolana && (
    (solDefiCount >= 2 && txCount >= 10) ||
    (txCount >= 20 && totalUsd > 10000) ||
    (txCount >= 10 && totalUsd > 50000)
  );

  console.log("Classification inputs:", {
    labelNames: labelNames, isFund: isFund, isWhale: isWhale, isPerp: isPerp,
    hasStrongPnl: hasStrongPnl, isSolSmartMoney: isSolSmartMoney,
    solDefiCount: solDefiCount, txCount: txCount, totalUsd: totalUsd,
    defiTokens: defiTokens, memeTokens: memeTokens, balCount: balArr.length,
  });

  var arc, style;
  if (isFund) { arc = ARCHETYPES.SMART_MONEY; style = "Data-Driven"; }
  else if (hasStrongPnl && txCount >= 10) { arc = ARCHETYPES.SMART_MONEY; style = "Alpha Hunter"; }
  else if (isSolSmartMoney) { arc = ARCHETYPES.SMART_MONEY; style = "SOL Strategist"; }
  else if (isExchange) { arc = ARCHETYPES.WHALE; style = "Exchange Ops"; }
  else if (isPerp) { arc = ARCHETYPES.PERP_DEGEN; style = "Leveraged"; }
  else if (isWhale && txCount < 10) { arc = ARCHETYPES.DIAMOND_HANDS; style = "Long-Term"; }
  else if (isWhale) { arc = ARCHETYPES.WHALE; style = "Strategic Allocator"; }
  else if (memeTokens >= 2) { arc = ARCHETYPES.MEME_HUNTER; style = "Momentum"; }
  else if (isDeployer) { arc = ARCHETYPES.DEFI_NATIVE; style = "Builder"; }
  else if (defiTokens >= 3) { arc = ARCHETYPES.DEFI_NATIVE; style = "Yield"; }
  else if (hasStrongPnl) { arc = ARCHETYPES.SMART_MONEY; style = "Data-Driven"; }
  else if (txCount >= 30) { arc = ARCHETYPES.ACTIVE_TRADER; style = "Active"; }
  else if (txCount < 5 && balArr.length > 0) { arc = ARCHETYPES.DIAMOND_HANDS; style = "Long-Term"; }
  else { arc = ARCHETYPES.ACTIVE_TRADER; style = "Analytical"; }

  var defiScore = Math.min(25, defiTokens * 5 + (isFund ? 10 : 0));
  var tradingScore = Math.min(25, Math.round(txCount / 2));
  var chainSet = {};
  balArr.forEach(function(b) { if (b._chain) chainSet[b._chain] = true; });

  var total = defiScore + tradingScore + chainsScore + holdingsScore + riskScore;
  var riskPct = memeTokens >= 3 ? 75 : totalUsd > 10000000 && stableTokens >= 2 ? 25 : txCount > 30 ? 60 : 40;
  var actPct = Math.min(100, Math.round(txCount * 2 + balArr.length));

  var traits = [];
  if (labelNames.length > 0) traits.push({ i: "\u{1F3F7}", t: labels[0].label || labels[0].fullname || "Labeled" });
  if (numChains > 1) traits.push({ i: "\u26D3", t: numChains + " Chains Active" });
  if (totalUsd > 1000000) traits.push({ i: "\u{1F4B0}", t: "$" + (totalUsd / 1000000).toFixed(1) + "M Portfolio" });
  if (defiTokens > 0) traits.push({ i: "\u{1F3D7}", t: defiTokens + " DeFi Tokens" });

  traits = traits.slice(0, 4);

  var topToken = balArr.length > 0 ? (balArr[0].token_symbol || balArr[0].symbol || "?") + " $" + (parseFloat(balArr[0].value_usd || balArr[0].usdValue || 0) / 1000).toFixed(0) + "k" : "No balances found";

  return {
    arc: arc, score: total, defi: defiScore, trading: tradingScore,
    chains: chainsScore, holdings: holdingsScore, risk: riskScore,
    riskPct: riskPct, style: style, actPct: actPct, traits: traits,
    flow: "Top holding: " + topToken,
    _raw: { labels: labels, balances: balArr, txCount: txCount, totalUsd: totalUsd },
  };
}

async function buildFromAPI(addr) {
  var short = addr.slice(0, 6) + "..." + addr.slice(-4);
  var results = await Promise.allSettled([
    fetchLabels(addr),
    fetchBalances(addr),
    fetchTransactions(addr),
    fetchPnl(addr),
  ]);
  var rawLabels = results[0].status === "fulfilled" ? results[0].value : [];
  // Deep-extract labels array from any Nansen response shape
  var labels = extractArray(rawLabels);
  console.log("Labels raw:", JSON.stringify(rawLabels), "→ extracted:", labels);
  // Also do a deep string scan for smart money indicators in raw response
  var rawLabelStr = JSON.stringify(rawLabels || {}).toLowerCase();
  var hasSmartLabel = rawLabelStr.includes("smart") || rawLabelStr.includes("fund") || rawLabelStr.includes("trader");
  console.log("Smart label in raw response:", hasSmartLabel, "raw string sample:", rawLabelStr.slice(0, 500));
  var balances = results[1].status === "fulfilled" ? results[1].value : [];
  var txData = results[2].status === "fulfilled" ? results[2].value : { data: [] };
  var rawPnl = results[3].status === "fulfilled" ? results[3].value : null;
  var pnlData = rawPnl;
  console.log("PnL raw:", JSON.stringify(rawPnl));

  var name = short;
  if (Array.isArray(labels) && labels.length > 0) {
    name = labels[0].fullname || labels[0].label || short;
  }

  var classified = classifyWallet(labels, balances, txData, pnlData, hasSmartLabel);
  classified.short = short;
  classified.name = name;
  if (balances && balances._activeChains && balances._activeChains.length > 0) {
    classified.activeChains = balances._activeChains;
  } else {
    classified.activeChains = getChainsForAddress(addr);
  }
  return classified;
}

// ═══════ IMAGE CAPTURE HELPERS ═══════
async function captureCardAsCanvas(el) {
  // Find the actual ScoreCard root element inside the ref
  var target = el.querySelector("[data-scorecard]") || el;
  return html2canvas(target, {
    backgroundColor: G.card,
    scale: 2,
    useCORS: true,
    logging: false,
    onclone: function(clonedDoc, clonedEl) {
      // Ensure no animation hides the content
      clonedEl.style.opacity = "1";
      clonedEl.style.transform = "none";
      clonedEl.style.animation = "none";
      // Also fix any parent opacity
      var p = clonedEl.parentElement;
      while (p) { p.style.opacity = "1"; p.style.animation = "none"; p = p.parentElement; }
    },
  });
}

async function captureCardAsBlob(el) {
  var canvas = await captureCardAsCanvas(el);
  return new Promise(function(resolve) {
    canvas.toBlob(function(blob) { resolve(blob); }, "image/png");
  });
}

async function copyCardImage(el, setCopyText) {
  try {
    var blob = await captureCardAsBlob(el);
    await navigator.clipboard.write([
      new ClipboardItem({ "image/png": blob })
    ]);
    setCopyText("COPIED!");
    setTimeout(function() { setCopyText("COPY"); }, 2000);
  } catch (e) {
    console.error("Copy failed:", e);
    // Fallback: download instead
    downloadCardImage(el);
  }
}

async function downloadCardImage(el) {
  var canvas = await captureCardAsCanvas(el);
  var link = document.createElement("a");
  link.download = "wallet-dna.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

async function shareToX(el, d) {
  // Download the image first so user can attach it
  await downloadCardImage(el);
  var text = "My WalletDNA Score: " + d.score + "/100 " + d.arc.icon + " " + d.arc.name + "\n\n" +
    d.traits.map(function(t) { return t.i + " " + t.t; }).join("\n") + "\n\n" +
    "Get yours at walletdna.vercel.app\n#WalletDNA #OnChain";
  var url = "https://x.com/intent/post?text=" + encodeURIComponent(text);
  window.open(url, "_blank");
}
